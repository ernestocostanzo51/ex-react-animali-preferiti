<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I miei animali Preferiti</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/6.26.0/babel.min.js"></script>
</head>
<body>
    <header>
      <h1>I miei animali Preferiti</h1>
    </header>
    <main>
        <figure>
            <img src="https://picsum.photos/400/300" alt="Immagine Casuale">
        </figure>
        <div class="lista-animali"></div>
    </main>
    <footer>
      <p>Creato con amore da... un collega sbadato! 🐾</p>
    </footer>

<script type="text/babel">
   
   const animalsChoices = ["Cane", "Gatto", "Pappagallo", "Cavallo", "Panda"];




const { useState } = React

function Modal({
      title, 
      content, 
      show = false, 
      onClose = () => {},
      onConfirm = () => {}
  }){
      return show && ReactDOM.createPortal(
          <div className="modal-container">
              <div className="modal">
                  <h2>{title}</h2>
                  <div>{content}</div>
                  <button onClick={onClose}>Annulla</button>
                  <button onClick={onConfirm}>Conferma</button>
              </div>
          </div>,
          document.body
      )
  }
      const ListaAnimali = () => {
     
        const [animali, setAnimali] = useState([]);
        
        const [show , setShow] = useState(false)

        const [inserimento , setInserimento] = useState("")

        const aggiungiAnimaleCasuale = () => {
         setAnimali([...animali , inserimento])
         setShow(false)
        };

        const trueModale = () =>  setShow(true)
         
        

     

        return (
          <div>
            <button 
              onClick={trueModale}>
              Aggiungi Animale 
            </button>

            <details>
              <summary>Animali ({animali.length})</summary>
              <ul>
                {animali.map((animale, i) => (
                  <li key={i}>{animale}</li>
                ))}
              </ul>
            </details>
            <Modal
            show={show}
            onClose={trueModale}
            onConfirm={aggiungiAnimaleCasuale}
            title="aggiungi animale"
            content={
              <input
              type="text"
              value={inserimento}
              onChange={e => setInserimento(e.target.value)}
              />
            }
            />
          </div>
        );
      };

   
      const { createRoot } = ReactDOM;
      const listaAnimali = document.querySelector(".lista-animali");
      const root = createRoot(listaAnimali);
      root.render(<ListaAnimali />);
    </script>
</body>
</html>
